    <!-- SITE CONTENT -->
    <div>
      <section class="my-8 overflow-hidden">
        <div class="grid lg:grid-cols-2 items-center forgot-card">
          <!-- FORGOT FORM -->
          <div
            class="re-forgot-container relative bg-white px-6 py-16 md:p-10 w-full max-w-md border border-gray-200 forgot"
          >
            <div class="absolute top-4 right-4 text-xl text-gray-500">
              <a class="" href="../index.html"
                ><i class="fa-solid fa-xmark"></i
              ></a>
            </div>
            <h2 class="text-gray-800 text-3xl font-semibold mb-4 text-center">
              Forgot Password
            </h2>

            <p class="text-gray-500 text-sm text-center mb-8">
              Enter your registered Gmail address and we'll send you a reset
              link.
            </p>

            <form id="reForgotForm" class="space-y-6" novalidate>
              <!-- Email -->
              <div>
                <label class="text-gray-600 text-sm">Email Address</label>
                <input
                  type="email"
                  placeholder="Enter your email"
                  id="reForgotEmail"
                  class="re-input w-full mt-2 p-3 bg-white border border-gray-300 rounded-md text-gray-800 focus:border-primary"
                  required
                />
                <p
                  id="forgotEmailError"
                  class="text-red-500 text-sm mt-1 hidden"
                >
                  Only @gmail.com email addresses are allowed.
                </p>
              </div>

              <!-- Success Message -->
              <p id="forgotSuccess" class="text-green-600 text-sm hidden">
                Reset link sent successfully! Redirecting...
              </p>

              <!-- Submit -->
              <button
                type="submit"
                class="re-btn w-full bg-primary text-white p-3 rounded-md font-medium cursor-pointer"
              >
                Send Reset Link
              </button>
            </form>

            <div class="text-center mt-6">
              <a
                href="./login.html"
                class="text-primary text-sm hover:underline"
              >
                Back to Login
              </a>
            </div>
          </div>
          <!-- IMAGE -->

              class="w-full h-full object-cover max-w-md"
              src="../src/assets/forgot.webp"
              alt="forgot"
            />
          </div>
